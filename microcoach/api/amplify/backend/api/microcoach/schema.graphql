input AMPLIFY { globalAuthRule: AuthRule = { allow: public } }

# ── Classroom ──────────────────────────────────────────────────────────
# One record per teacher in the pilot. Stable across weeks.
type Classroom @model {
  id: ID!
  classroomName: String! @index(name: "byClassroomName", queryField: "classroomsByClassroomName")
  grade: Int
  subject: String
  state: String
  schoolYear: String
  cohortSize: Int
  currentWeek: Int                  # weekNumber of the active Session; set by generate-next-steps script
  students: [Student] @hasMany
  sessions: [Session] @hasMany
  # NOTE: misconceptions also appear here (via classroomId GSI on Misconception)
  # for DynamoDB querying convenience, but they semantically belong to Session.
  misconceptions: [Misconception] @hasMany
  savedNextSteps: [SavedNextStep] @hasMany
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

# ── Session ────────────────────────────────────────────────────────────
# One record per weekly cycle: PPQ → LLM analysis → next step generation → teacher use.
#
# Lifecycle (status field):
#   "data_ingested"  — PPQ data uploaded, ready for generate script
#   "generated"      — generate script has run; pregeneratedNextSteps is populated
#   "completed"      — teachers have finished acting on this week's content
type Session @model {
  id: ID!
  classroomId: ID! @index(name: "byClassroom")
  sessionLabel: String              # "Session1", "W19 2025-26"
  weekNumber: Int
  topic: String                     # "Dividing Fractions"
  ccssStandards: [String]           # ["6.NS.A.1"]
  status: String                    # "data_ingested" | "generated" | "completed"
  ppqAssessmentId: ID               # FK to PPQ Assessment record
  postPpqAssessmentId: ID           # FK to PostPPQ Assessment record
  assessments: [Assessment] @hasMany
  misconceptions: [Misconception] @hasMany
  # Precomputed frontend view — set by the generate-next-steps script.
  # Cached here so the app fetches it in a single listClassrooms call with no extra LLM cost.
  pregeneratedNextSteps: AWSJSON
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

# ── Student ────────────────────────────────────────────────────────────
type Student @model {
  id: ID!
  classroomId: ID!
  name: String!
  externalId: String
  performanceX: Float
  performanceY: Float
  confidenceLevel: Int!
  status: String!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

# ── Assessment ─────────────────────────────────────────────────────────
enum AssessmentType {
  PPQ
  POST_PPQ
  QUIZ
}

enum QuestionType {
  MC
  OER
  RUBRIC
}

type Assessment @model {
  id: ID!
  classroomId: ID! @index(name: "byClassroomAssessment")
  sessionId: ID!   @index(name: "bySession")
  assessmentCode: String!
  type: AssessmentType!
  weekNumber: Int!
  administeredAt: AWSDate
  topic: String
  ccssStandards: [String]!
  durationMinutes: Int
  calculatorAllowed: Boolean
  classPercentCorrect: Float
  questions: [AssessmentQuestion]
  studentResponses: [StudentResponse] @hasMany
  sourceAssessmentId: ID            # for POST_PPQ: the originating PPQ Assessment id
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type AssessmentQuestion {
  questionNumber: Int!
  questionType: QuestionType!
  correctAnswer: String
  pointValue: Int!
  ccssStandard: String
  classPercentCorrect: Float
}

# ── StudentResponse ────────────────────────────────────────────────────
type StudentResponse @model {
  id: ID!
  assessmentId: ID! @index(name: "byAssessment")
  studentId: ID!    @index(name: "byStudentResponse")
  totalScore: Float
  questionResponses: [QuestionResponse]!
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type QuestionResponse {
  questionNumber: Int!
  response: String
  isCorrect: Boolean!
  pointsEarned: Float!
}

# ── Misconception ──────────────────────────────────────────────────────
# AI-detected misconception for one Session. Created by the generate-next-steps script.
type Misconception @model {
  id: ID!
  classroomId: ID! @index(name: "byClassroom")
  sessionId: ID!   @index(name: "bySession")
  ccssStandard: String!
  title: String!
  description: String!
  aiReasoning: String
  studentCount: Int
  studentPercent: Float
  severity: String                  # "high" | "medium" | "low"
  priority: String                  # "1" | "2" | "3" | "4"
  occurrence: String                # "first" | "recurring"
  successIndicators: [String]
  evidence: MisconceptionEvidence
  # LLM-selected standard codes for the CCSS learning graph (used in next step display)
  prerequisiteGapCodes: [String]
  impactedObjectiveCodes: [String]
  activities: [Activity] @hasMany
  postPpqImprovement: Float         # percent improvement after PostPPQ
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type MisconceptionEvidence {
  source: String                    # "PPQ Q3, Q5"
  mostCommonError: String
  sampleStudentWork: [String]
  aiThinkingPattern: String
}

# ── Activity ───────────────────────────────────────────────────────────
# AI-generated next step per Misconception. Created by the generate-next-steps script.
enum ActivityType {
  NEXT_STEP
  LESSON_PLAN
  STRATEGY
}

enum ActivityStatus {
  GENERATED
  SAVED
  IN_PROGRESS
  COMPLETED
}

type Activity @model {
  id: ID!
  misconceptionId: ID! @index(name: "byMisconception")
  classroomId: ID!     @index(name: "byClassroom")
  sessionId: ID!       @index(name: "bySession")
  type: ActivityType!
  status: ActivityStatus!
  title: String!
  summary: String
  durationMinutes: Int
  format: String                    # "small_group" | "whole_class" | "individual"
  aiReasoning: String
  aiGenerated: Boolean!
  sourceContextDataIds: [String]    # ContextData IDs used to generate this
  tabs: Tabs
  completedAt: AWSDateTime
  postPpqImprovement: Float
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

# ── Tabs / Activity content ────────────────────────────────────────────
type Tabs {
  overview: Overview
  activitySteps: ActivitySteps
  materials: Materials
  studentGroupings: StudentGroupings
}

type Overview {
  whatStudentsDo: String
  whatYouDo: String
  importance: String
}

type ActivitySteps {
  setup: [String]
  problem: String
  coreActivity: [String]
  discussionQuestions: [String]
}

type Materials {
  required: [String]
  optional: [String]
}

type StudentGroupings {
  groups: [StudentGroup]
  highFlyers: HighFlyers
  aiRecommendation: String
}

type StudentGroup {
  name: String
  description: String
  students: [String]
}

type HighFlyers {
  students: [String]
  description: String
}

# ── SavedNextStep ──────────────────────────────────────────────────────
# A teacher's planned action item. Persists across sessions so teachers can
# track what they've committed to and completed over time.
type SavedNextStep @model {
  id: ID!
  classroomId: ID! @index(name: "byClassroom")
  sessionId: ID    @index(name: "bySession")  # which week this action came from
  activityId: ID                    # link to Activity record
  status: String!                   # "planned" | "completed"
  completedAt: AWSDateTime
  sortOrder: Int

  # Denormalized from Misconception at save time (so the record is self-contained
  # even as future sessions add new misconceptions)
  misconceptionId: String
  misconceptionTitle: String
  targetObjectiveStandard: String
  priority: String!
  studentCount: Int
  studentPercent: Int
  occurrence: String
  misconceptionSummary: String
  successIndicators: [String]

  # Denormalized from Activity at save time
  activityTitle: String
  activityTime: String
  activityFormat: String
  activitySummary: String
  aiReasoning: String
  evidence: MisconceptionEvidence
  tabs: Tabs
}

# ── Custom mutations (Lambda-backed LLM calls) ─────────────────────────
input GetLearningScienceInput {
  ccss: String!
}

input GetAnalyticsInput {
  classroomData: AWSJSON!
  learningScienceData: AWSJSON!
}

input GetAnalysisInput {
  classroomData: AWSJSON!
  learningScienceData: AWSJSON!
}

input GenerateNextStepInput {
  misconception: AWSJSON!
  learningScienceData: AWSJSON!
  classroomContext: AWSJSON
  contextData: AWSJSON          # Array of ContextData NEXT_STEP_LESSON records as few-shot examples
}

input GenerateSubMisconceptionsInput {
  misconception: AWSJSON!       # Single misconception object from analysis
}

type Mutation {
  getLearningScience(input: GetLearningScienceInput!): String
    @function(name: "microcoachGetLearningScience-${env}")
  getAnalytics(input: GetAnalyticsInput!): String
    @function(name: "microcoachLLM-${env}")
  getAnalysis(input: GetAnalysisInput!): String
    @function(name: "microcoachLLMAnalysis-${env}")
  generateNextStep(input: GenerateNextStepInput!): String
    @function(name: "microcoachLLMGeneration-${env}")
  generateSubMisconceptions(input: GenerateSubMisconceptionsInput!): String
    @function(name: "microcoachSubMisconceptions-${env}")
}

# ── ContextData ────────────────────────────────────────────────────────
# Knowledge library for AI coaching layer (next step reference docs, strategies)
enum ContextDataType {
  NEXT_STEP_LESSON
  EXEMPLAR
  STRATEGY
  WALKTHROUGH
  STUDENT_WORK_SAMPLE
  LESSON_PLAN
}

type ContextData @model {
  id: ID!
  type: ContextDataType!
  title: String!
  gradeLevel: Int
  weekNumber: Int
  ccssStandards: [String]
  assessmentCode: String
  isReference: Boolean              # true for References/ folder docs (shared across classrooms)
  nextStepLesson: NextStepLesson
  exemplarQuestions: [ExemplarQuestion]
  strategy: InstructionalStrategy
  walkthroughData: WalkthroughData
  createdAt: AWSDateTime!
  updatedAt: AWSDateTime!
}

type ExemplarQuestion {
  questionNumber: Int!
  questionText: String!
  ccssStandard: String!
  correctAnswer: String!
  pointValue: Int!
  answerChoices: [AnswerChoice]
  misconceptions: [ExemplarMisconception]
  sourceNote: String
}

type AnswerChoice {
  label: String!
  text: String!
}

type ExemplarMisconception {
  description: String!
  targetAnswer: String
}

type NextStepLesson {
  targetAssessmentCode: String!
  targetQuestionNumbers: [Int]
  topic: String!
  targetProblem: String!
  errorScenarios: [ErrorScenario]
  phases: [LessonPhase]
  keyTakeaways: [String]
  independentProblems: [String]
  exitTicket: String
}

type ErrorScenario {
  studentLabel: String!
  isCorrect: Boolean!
  approach: String!
  reasoning: [String]
}

type LessonPhase {
  phaseName: String!
  durationMinutes: Int
  steps: [String]
  teacherPrompts: [String]
}

type InstructionalStrategy {
  name: String!
  description: String!
  steps: [String]
  applicableGrades: [Int]
  applicableStandards: [String]
  examples: [String]
}

type WalkthroughData {
  quarter: String
  schools: [SchoolObservation]
}

type SchoolObservation {
  schoolCode: String!
  rubricScores: AWSJSON
  notes: String
}
